<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports - Analytics Dashboard</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/reports.css">
</head>
<body>

<div class="dashboard-container">
    
    <aside class="sidebar">
        <div class="logo">
            <i class="fas fa-chart-pie"></i>
            <span>Analytics Hub</span>
        </div>
        
        <nav class="nav-menu">
            <a href="../index.html" class="nav-item">
                <i class="fas fa-tachometer-alt"></i>
                <span>Dashboard</span>
            </a>
            <a href="traffic.html" class="nav-item">
                <i class="fas fa-chart-line"></i>
                <span>Traffic Sources</span>
            </a>
            <a href="visitors.html" class="nav-item">
                <i class="fas fa-users"></i>
                <span>Visitor Types</span>
            </a>
            <a href="countries.html" class="nav-item">
                <i class="fas fa-globe"></i>
                <span>Countries & Cities</span>
            </a>
            <a href="conversion.html" class="nav-item">
                <i class="fas fa-percent"></i>
                <span>Conversion Pages</span>
            </a>
            <a href="reports.html" class="nav-item active">
                <i class="fas fa-file-alt"></i>
                <span>Reports</span>
            </a>
        </nav>
    </aside>
    
    <main class="main-content">
        
        <header class="top-header">
            <div class="page-title">
                <h1>Reports 📋</h1>
                <p>Download and view detailed analytics reports</p>
            </div>
            <div class="user-info">
                <i class="fas fa-bell"></i>
                <div class="user-avatar">
                    <span>AD</span>
                </div>
            </div>
        </header>
        
        <!-- Summary Cards -->
        <div class="summary-cards" id="summaryCards">
            <!-- Will be added by JS -->
        </div>
        
        <!-- Report Tables -->
        <div class="reports-grid">
            
            <div class="stats-card full-width">
                <h3><i class="fas fa-chart-line"></i> Weekly Performance Report</h3>
                <div class="table-container">
                    <table class="report-table" id="weeklyReport">
                        <!-- Will be added by JS -->
                    </table>
                </div>
            </div>
            
            <div class="stats-card">
                <h3><i class="fas fa-download"></i> Export Reports</h3>
                <div class="export-buttons">
                    <button class="export-btn" onclick="exportReport('PDF')">
                        <i class="fas fa-file-pdf"></i> Export as PDF
                    </button>
                    <button class="export-btn" onclick="exportReport('CSV')">
                        <i class="fas fa-file-excel"></i> Export as CSV
                    </button>
                    <button class="export-btn" onclick="exportReport('PRINT')">
                        <i class="fas fa-print"></i> Print Report
                    </button>
                </div>
            </div>
            
            <div class="stats-card">
                <h3><i class="fas fa-calendar"></i> Date Range</h3>
                <div class="date-range">
                    <label>From:</label>
                    <input type="date" id="startDate" class="date-input">
                    <label>To:</label>
                    <input type="date" id="endDate" class="date-input">
                    <button class="apply-btn" onclick="applyDateRange()">Apply</button>
                </div>
            </div>
            
        </div>
        
    </main>
</div>

<script src="../js/data.js"></script>
<script src="../js/reports.js"></script>
<script src="../js/common.js"></script>

</body>
</html>
