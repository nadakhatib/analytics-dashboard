<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countries & Cities - Analytics Dashboard</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/countries.css">
</head>
<body>

<div class="dashboard-container">
    
    <aside class="sidebar">
        <div class="logo">
            <i class="fas fa-chart-pie"></i>
            <span>Analytics Hub</span>
        </div>
        
        <nav class="nav-menu">
            <a href="../index.html" class="nav-item">
                <i class="fas fa-tachometer-alt"></i>
                <span>Dashboard</span>
            </a>
            <a href="traffic.html" class="nav-item">
                <i class="fas fa-chart-line"></i>
                <span>Traffic Sources</span>
            </a>
            <a href="visitors.html" class="nav-item">
                <i class="fas fa-users"></i>
                <span>Visitor Types</span>
            </a>
            <a href="countries.html" class="nav-item active">
                <i class="fas fa-globe"></i>
                <span>Countries & Cities</span>
            </a>
            <a href="conversion.html" class="nav-item">
                <i class="fas fa-percent"></i>
                <span>Conversion Pages</span>
            </a>
            <a href="reports.html" class="nav-item">
                <i class="fas fa-file-alt"></i>
                <span>Reports</span>
            </a>
        </nav>
    </aside>
    
    <main class="main-content">
        
        <header class="top-header">
            <div class="page-title">
                <h1>Countries & Cities 🌍</h1>
                <p>Geographic distribution of your audience</p>
            </div>
            <div class="user-info">
                <i class="fas fa-bell"></i>
                <div class="user-avatar">
                    <span>AD</span>
                </div>
            </div>
        </header>
        
        <div class="countries-grid">
            
            <div class="stats-card">
                <h3><i class="fas fa-flag-checkered"></i> Top Countries</h3>
                <div class="geo-list" id="countriesList">
                    <!-- Will be added by JS -->
                </div>
            </div>
            
            <div class="stats-card">
                <h3><i class="fas fa-city"></i> Top Cities</h3>
                <div class="geo-list" id="citiesList">
                    <!-- Will be added by JS -->
                </div>
            </div>
            
            <div class="stats-card full-width">
                <h3><i class="fas fa-chart-bar"></i> Geographic Coverage</h3>
                <canvas id="geoBarChart"></canvas>
            </div>
            
        </div>
        
    </main>
</div>

<script src="../js/data.js"></script>
<script src="../js/countries.js"></script>
<script src="../js/common.js"></script>

</body>
</html>
